services:
  mongodb:
    image: mongo:7
    container_name: procurement-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - procurement-mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: procurement-app
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      MONGODB_URI: mongodb://mongodb:27017/procurement_db
      SERVER_PORT: 8080
      JWT_SECRET: ${JWT_SECRET:?Set a unique JWT_SECRET in your .env file before running docker compose}
      JWT_EXPIRATION_MS: 86400000
      SPRING_PROFILES_ACTIVE: prod
      UPLOAD_DIR: /app/uploads
    volumes:
      - procurement-uploads:/app/uploads

volumes:
  procurement-mongo-data:
  procurement-uploads:
